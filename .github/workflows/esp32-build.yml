name: ESP32 Build

on:
  push:
    paths:
      - "device/esp32/**"
      - ".github/workflows/esp32-build.yml"
  pull_request:
    paths:
      - "device/esp32/**"
      - ".github/workflows/esp32-build.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Provide CI local config
        working-directory: device/esp32
        run: cp include/local_config.example.h include/local_config.h

      - name: Build ESP32 firmware
        working-directory: device/esp32
        run: python -m platformio run
